<div class="parent">
  <div class="login-card text-center">
    <h3 class="mb-4">Login</h3>

    <form>
      <div class="mb-3 text-start">
        <label class="form-label">Email</label>
        <input
          type="email"
          [(ngModel)]="loginModelObj.emailId"
          class="form-control"
          name="email"
          placeholder="Enter email"
        />
      </div>

      <div class="mb-4 text-start">
        <label class="form-label">Password</label>
        <input
          type="password"
          [(ngModel)]="loginModelObj.password"
          class="form-control"
          name="password"
          placeholder="Enter password"
        />
      </div>

      <button class="btn btn-login w-100" (click)="loginUser()">Login</button>

      <div class="mt-3">
        <small>Don't have an account? <a href="#" class="text-white">Register</a></small>
      </div>
    </form>
  </div>
</div>
