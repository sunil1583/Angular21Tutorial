<section class="container py-4">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
      <div class="card shadow-sm">
        <div class="card-body">
          <h2 class="h5 mb-3">User Details</h2>

          <form #formData="ngForm">
            <div class="mb-3">
              <label for="name" class="form-label">Name</label>
              <input
                [(ngModel)]="userOjbect.name"
                #name="ngModel"
                required
                minlength="5"
                type="text"
                class="form-control"
                id="name"
                name="name"
                placeholder="John Doe"
              />
              @if (name.touched || name.dirty) {
                <div class="text-danger">
                  @if (name.errors?.['required']) {
                    <span>This is required field</span>
                  } @else if (name.errors?.['minlength']) {
                    <span>Min length is 5</span>
                  }
                </div>
              }
            </div>
            <div class="d-flex justify-content-end">
              <button type="submit" [disabled]="formData.invalid" class="btn btn-primary">
                Save
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
